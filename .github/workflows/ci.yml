name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SOCKET_URL: https://draft-random-socket.onrender.com
          SOCKET_SERVER_URL: https://draft-random-socket.onrender.com

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render web deploy
        if: env.RENDER_DEPLOY_HOOK_WEB != ''
        env:
          RENDER_DEPLOY_HOOK_WEB: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_WEB"

      - name: Trigger Render socket deploy
        if: env.RENDER_DEPLOY_HOOK_SOCKET != ''
        env:
          RENDER_DEPLOY_HOOK_SOCKET: ${{ secrets.RENDER_DEPLOY_HOOK_SOCKET }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_SOCKET"

      - name: Render deploy hooks note
        if: env.RENDER_DEPLOY_HOOK_WEB == '' && env.RENDER_DEPLOY_HOOK_SOCKET == ''
        env:
          RENDER_DEPLOY_HOOK_WEB: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
          RENDER_DEPLOY_HOOK_SOCKET: ${{ secrets.RENDER_DEPLOY_HOOK_SOCKET }}
        run: echo "Render auto-deploy from GitHub is enabled — no deploy hooks configured."
